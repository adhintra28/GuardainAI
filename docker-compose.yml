services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: guardian
    ports:
      - '5433:5432'
    volumes:
      - guardian_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d guardian']
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  guardian_pgdata:
